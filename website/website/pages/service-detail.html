<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service — Site2Success</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/pages.css">
    <style>
        .sd-hero { padding: 8rem 2rem 3rem; max-width: 1200px; margin: 0 auto; }
        .sd-breadcrumb { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem; font-size: 0.875rem; color: var(--gray-400); }
        .sd-breadcrumb a { color: var(--gray-400); transition: color 0.2s; }
        .sd-breadcrumb a:hover { color: var(--coral); }
        .sd-breadcrumb svg { width: 14px; height: 14px; opacity: 0.5; }
        .sd-category-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.8rem; font-weight: 600; margin-bottom: 1.25rem; }
        .sd-category-badge.ai { background: rgba(74,144,217,0.1); color: #4A90D9; }
        .sd-category-badge.auto { background: rgba(40,200,64,0.1); color: #28C840; }
        .sd-category-badge.web { background: rgba(255,107,74,0.1); color: var(--coral); }
        .sd-dot { width: 8px; height: 8px; border-radius: 50%; }
        .sd-category-badge.ai .sd-dot { background: #4A90D9; }
        .sd-category-badge.auto .sd-dot { background: #28C840; }
        .sd-category-badge.web .sd-dot { background: var(--coral); }
        .sd-hero h1 { font-size: 2.75rem; font-weight: 800; color: var(--navy-dark); line-height: 1.15; margin-bottom: 1rem; }
        .sd-hero .sd-subtitle { font-size: 1.2rem; color: var(--gray-500); line-height: 1.7; max-width: 700px; margin-bottom: 2rem; }
        .sd-cta-btn { display: inline-flex; align-items: center; gap: 0.6rem; padding: 1rem 2rem; background: var(--gradient-primary); color: white; border-radius: 100px; font-weight: 700; font-size: 1rem; transition: all 0.3s ease; text-decoration: none; }
        .sd-cta-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255,107,74,0.35); }

        .sd-content { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; }
        .sd-main h2 { font-size: 1.5rem; font-weight: 800; color: var(--navy-dark); margin-bottom: 1rem; }
        .sd-main p { font-size: 1.0625rem; color: var(--gray-500); line-height: 1.85; margin-bottom: 1.25rem; }
        .sd-features { list-style: none; padding: 0; margin: 1.5rem 0 2rem; }
        .sd-features li { padding: 0.65rem 0; color: var(--gray-500); font-size: 1rem; display: flex; align-items: flex-start; gap: 0.75rem; line-height: 1.6; }
        .sd-features li svg { color: var(--coral); flex-shrink: 0; margin-top: 4px; }

        .sd-sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .sd-sidebar-card { background: white; border-radius: 20px; padding: 1.75rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .sd-sidebar-card h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray-400); font-weight: 700; margin-bottom: 1rem; }
        .sd-sidebar-item { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.95rem; }
        .sd-sidebar-item:last-child { border-bottom: none; }
        .sd-sidebar-item .label { color: var(--gray-400); }
        .sd-sidebar-item .value { color: var(--navy-dark); font-weight: 600; }
        .sd-use-cases { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .sd-use-cases span { padding: 0.35rem 0.85rem; background: var(--gray-50); border-radius: 8px; font-size: 0.85rem; color: var(--gray-500); font-weight: 500; }

        .sd-cta-banner { max-width: 1200px; margin: 0 auto 4rem; padding: 0 2rem; }
        .sd-cta-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 24px; padding: 3rem; display: flex; justify-content: space-between; align-items: center; gap: 2rem; flex-wrap: wrap; }
        .sd-cta-card h2 { color: white; font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; }
        .sd-cta-card p { color: rgba(255,255,255,0.65); font-size: 1rem; }

        @media (max-width: 768px) {
            .sd-hero h1 { font-size: 2rem; }
            .sd-content { grid-template-columns: 1fr; }
            .sd-cta-card { flex-direction: column; text-align: center; }
        }
    
        /* ── Mobile Nav (shared) ── */
        @media (max-width: 1024px) {
            .nav-links {
                position: fixed;
                top: 80px;
                left: 50%;
                transform: translateX(-50%) translateY(-20px);
                width: calc(100% - 48px);
                max-width: 400px;
                flex-direction: column;
                gap: 0.5rem;
                padding: 1.5rem;

                border-radius: 24px;
                border: 1px solid rgba(255,255,255,0.6);
                box-shadow: 0 8px 32px rgba(0,0,0,0.06);
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
                transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
                z-index: 999;
            }
            .nav-links.mobile-open {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
                transform: translateX(-50%) translateY(0);
            }
            .nav-item {
                width: 100%;
                text-align: center;
                padding: 0.875rem 1.25rem;
            }
            .menu-toggle {
                display: flex !important;
            }
            .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
            .menu-toggle.active span:nth-child(2) { opacity: 0; }
            .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
        }
        </style>
</head>

    function render() {
        const id = new URLSearchParams(window.location.search).get('id');
        const s = services[id];
        if (!s) { window.location.href = 'services.html'; return; }

        document.title = s.title + ' — Site2Success';
        document.getElementById('breadcrumbTitle').textContent = s.title;
        document.getElementById('serviceTitle').textContent = s.title;
        document.getElementById('serviceSubtitle').textContent = s.subtitle;

        const badge = document.getElementById('categoryBadge');
        badge.className = 'sd-category-badge ' + s.category;
        badge.innerHTML = '<div class="sd-dot"></div>' + s.categoryLabel;

        let featuresHtml = s.features.map(f => '<li>' + checkSvg + f + '</li>').join('');
        document.getElementById('serviceMain').innerHTML =
            '<h2>Overview</h2><p>' + s.overview + '</p>' +
            '<h2 style="margin-top:2rem;">What You Get</h2><ul class="sd-features">' + featuresHtml + '</ul>';

        let useCases = s.bestFor.map(u => '<span>' + u + '</span>').join('');
